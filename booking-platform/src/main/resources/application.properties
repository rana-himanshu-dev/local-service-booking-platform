# ==============================
# SERVER CONFIG
# ==============================
server.port=8080

# ==============================
# MYSQL DATABASE CONFIG
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/localservice_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / HIBERNATE CONFIG
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ==============================
# THYMELEAF CONFIG
# ==============================
spring.thymeleaf.cache=false

# ==============================
# MAIL CONFIG (Gmail SMTP)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_HERE
spring.mail.password=YOUR_GMAIL_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# JWT CONFIG
# ==============================
app.jwt.secret=localservice_super_secret_jwt_key_2024_do_not_share
app.jwt.expiration=86400000