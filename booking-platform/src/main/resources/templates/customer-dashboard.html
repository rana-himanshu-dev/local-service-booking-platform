<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard - LocalService</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .provider-card:hover { transform: translateY(-3px); transition: 0.3s; }
        .sidebar { min-height: 100vh; background: #f8f9fa; }
        .active-nav { background: #0d6efd; color: white !important; border-radius: 8px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold">🔧 LocalService</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="userEmail"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <ul class="nav flex-column gap-2 mt-3">
                <li class="nav-item">
                    <a href="#" onclick="showSection('search')"
                       class="nav-link text-dark active-nav px-3 py-2" id="nav-search">
                        🔍 Search Providers
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" onclick="showSection('bookings')"
                       class="nav-link text-dark px-3 py-2" id="nav-bookings">
                        📅 My Bookings
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" onclick="showSection('profile')"
                       class="nav-link text-dark px-3 py-2" id="nav-profile">
                        👤 My Profile
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Search Section -->
            <div id="section-search">
                <h4 class="mb-4">🔍 Search Service Providers</h4>

                <!-- Search Filters -->
                <div class="card p-3 mb-4 shadow-sm">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <input type="text" id="searchCity"
                                   class="form-control" placeholder="Enter city...">
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="searchKeyword"
                                   class="form-control" placeholder="Search keyword...">
                        </div>
                        <div class="col-md-3">
                            <input type="number" id="searchMaxRate"
                                   class="form-control" placeholder="Max hourly rate...">
                        </div>
                        <div class="col-md-3">
                            <button onclick="searchProviders()"
                                    class="btn btn-primary w-100">Search</button>
                        </div>
                    </div>
                </div>

                <!-- Search Results -->
                <div id="searchResults" class="row g-3">
                    <p class="text-muted">Enter search criteria to find providers.</p>
                </div>
            </div>

            <!-- Bookings Section -->
            <div id="section-bookings" class="d-none">
                <h4 class="mb-4">📅 My Bookings</h4>
                <div id="bookingsList"></div>
            </div>

            <!-- Profile Section -->
            <div id="section-profile" class="d-none">
                <h4 class="mb-4">👤 My Profile</h4>
                <div id="profileDetails"></div>
            </div>

        </div>
    </div>
</div>

<!-- Book Slot Modal -->
<div class="modal fade" id="bookModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Book Service</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-3">Available Time Slots:</p>
                <div id="availableSlots"></div>
                <div class="mt-3">
                    <label class="form-label">Notes (optional)</label>
                    <textarea id="bookingNotes" class="form-control" rows="2"
                              placeholder="Any special requests..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                <button type="button" onclick="confirmBooking()"
                        class="btn btn-primary">Confirm Booking</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('token');
    const email = localStorage.getItem('email');
    let selectedSlotId = null;

    // Check authentication
    if (!token) window.location.href = '/login';
    document.getElementById('userEmail').textContent = email;

    // Show section
    function showSection(section) {
        ['search', 'bookings', 'profile'].forEach(s => {
            document.getElementById('section-' + s).classList.add('d-none');
            document.getElementById('nav-' + s).classList.remove('active-nav');
        });
        document.getElementById('section-' + section).classList.remove('d-none');
        document.getElementById('nav-' + section).classList.add('active-nav');

        if (section === 'bookings') loadBookings();
        if (section === 'profile') loadProfile();
    }

    // Search providers
    async function searchProviders() {
        const city = document.getElementById('searchCity').value;
        const keyword = document.getElementById('searchKeyword').value;
        const maxRate = document.getElementById('searchMaxRate').value;

        let url = `/api/provider/search/advanced?`;
        if (city) url += `city=${city}&`;
        if (keyword) url += `keyword=${keyword}&`;
        if (maxRate) url += `maxHourlyRate=${maxRate}&`;

        const response = await fetch(url);
        const providers = await response.json();

        const container = document.getElementById('searchResults');
        if (providers.length === 0) {
            container.innerHTML = '<p class="text-muted">No providers found.</p>';
            return;
        }

        container.innerHTML = providers.map(p => `
            <div class="col-md-4">
                <div class="card provider-card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">${p.businessName}</h5>
                        <p class="text-muted mb-1">📍 ${p.city}</p>
                        <p class="text-muted mb-1">💼 ${p.categoryName}</p>
                        <p class="text-muted mb-1">⭐ ${p.avgRating} (${p.totalReviews} reviews)</p>
                        <p class="text-muted mb-2">💰 ₹${p.hourlyRate}/hr</p>
                        <p class="small mb-3">${p.description}</p>
                        <button onclick="openBookModal(${p.id})"
                                class="btn btn-primary btn-sm w-100">Book Now</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Open booking modal
    async function openBookModal(providerId) {
        const response = await fetch(`/api/slots/provider/${providerId}/available`);
        const slots = await response.json();

        const container = document.getElementById('availableSlots');
        if (slots.length === 0) {
            container.innerHTML = '<p class="text-muted">No slots available.</p>';
        } else {
            container.innerHTML = slots.map(slot => `
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio"
                           name="slot" value="${slot.id}"
                           onchange="selectedSlotId = ${slot.id}">
                    <label class="form-check-label">
                        📅 ${slot.slotDate} | ⏰ ${slot.startTime} - ${slot.endTime}
                    </label>
                </div>
            `).join('');
        }

        new bootstrap.Modal(document.getElementById('bookModal')).show();
    }

    // Confirm booking
    async function confirmBooking() {
        if (!selectedSlotId) {
            alert('Please select a time slot');
            return;
        }

        const notes = document.getElementById('bookingNotes').value;

        const response = await fetch('/api/bookings', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ timeSlotId: selectedSlotId, notes })
        });

        if (response.ok) {
            alert('Booking confirmed successfully! ✅');
            bootstrap.Modal.getInstance(document.getElementById('bookModal')).hide();
        } else {
            const data = await response.json();
            alert('Booking failed: ' + data.message);
        }
    }

    // Load bookings
    async function loadBookings() {
        const response = await fetch('/api/bookings/my', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const bookings = await response.json();

        const container = document.getElementById('bookingsList');
        if (bookings.length === 0) {
            container.innerHTML = '<p class="text-muted">No bookings found.</p>';
            return;
        }

        container.innerHTML = `
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-primary">
                        <tr>
                            <th>#</th>
                            <th>Provider</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bookings.map(b => `
                            <tr>
                                <td>${b.id}</td>
                                <td>${b.providerName}</td>
                                <td>${b.slotDate}</td>
                                <td>${b.startTime}</td>
                                <td>₹${b.totalAmount}</td>
                                <td>
                                    <span class="badge ${
                                        b.status === 'COMPLETED' ? 'bg-success' :
                                        b.status === 'CANCELLED' ? 'bg-danger' : 'bg-warning'
                                    }">${b.status}</span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // Load profile
    async function loadProfile() {
        const response = await fetch('/api/user/profile', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const user = await response.json();

        document.getElementById('profileDetails').innerHTML = `
            <div class="card shadow-sm" style="max-width: 500px;">
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label class="text-muted small">Full Name</label>
                        <p class="fw-semibold mb-0">${user.fullName}</p>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small">Email</label>
                        <p class="fw-semibold mb-0">${user.email}</p>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small">Phone</label>
                        <p class="fw-semibold mb-0">${user.phone}</p>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small">Role</label>
                        <p class="fw-semibold mb-0">
                            <span class="badge bg-primary">${user.role}</span>
                        </p>
                    </div>
                    <button onclick="window.location.href='/change-password'"
                            class="btn btn-outline-primary btn-sm mt-2">
                        Change Password
                    </button>
                </div>
            </div>
        `;
    }

    // Logout
    function logout() {
        localStorage.clear();
        window.location.href = '/login';
    }
</script>
</body>
</html>
