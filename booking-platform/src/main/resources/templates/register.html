<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - LocalService</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm p-4" style="width: 480px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🔧 LocalService</h2>
            <p class="text-muted">Create your account</p>
        </div>

        <div id="errorMessage" class="alert alert-danger d-none"></div>
        <div id="successMessage" class="alert alert-success d-none"></div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" id="fullName" class="form-control"
                   placeholder="Enter your full name">
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" id="email" class="form-control"
                   placeholder="Enter your email">
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" id="password" class="form-control"
                   placeholder="Minimum 6 characters">
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Phone Number</label>
            <input type="text" id="phone" class="form-control"
                   placeholder="10-digit number">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Register As</label>
            <select id="role" class="form-select">
                <option value="CUSTOMER">Customer</option>
                <option value="PROVIDER">Service Provider</option>
            </select>
        </div>

        <button onclick="register()" class="btn btn-primary w-100 py-2">Create Account</button>

        <p class="text-center mt-3 text-muted">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</div>

<script>
    async function register() {
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;
        const role = document.getElementById('role').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        try {
            const response = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, password, phone, role })
            });

            const data = await response.json();

            if (response.ok) {
                successDiv.classList.remove('d-none');
                successDiv.textContent = 'Registration successful! Redirecting to login...';
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = data.message || 'Registration failed';
            }
        } catch (error) {
            errorDiv.classList.remove('d-none');
            errorDiv.textContent = 'Something went wrong. Please try again.';
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
