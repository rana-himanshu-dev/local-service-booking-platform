<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - LocalService</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm p-4" style="width: 420px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🔧 LocalService</h2>
            <p class="text-muted">Sign in to your account</p>
        </div>

        <div id="errorMessage" class="alert alert-danger d-none"></div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" id="email" class="form-control"
                   placeholder="Enter your email">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" id="password" class="form-control"
                   placeholder="Enter your password">
        </div>
        <button onclick="login()" class="btn btn-primary w-100 py-2">Login</button>

        <p class="text-center mt-3 text-muted">
            Don't have an account? <a href="/register">Sign Up</a>
        </p>
    </div>
</div>

<script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Save token
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('email', data.email);

                // Redirect based on role
                if (data.role === 'ADMIN') window.location.href = '/admin/dashboard';
                else if (data.role === 'PROVIDER') window.location.href = '/provider/dashboard';
                else window.location.href = '/customer/dashboard';
            } else {
                errorDiv.classList.remove('d-none');
                errorDiv.textContent = data.message || 'Invalid credentials';
            }
        } catch (error) {
            errorDiv.classList.remove('d-none');
            errorDiv.textContent = 'Something went wrong. Please try again.';
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
